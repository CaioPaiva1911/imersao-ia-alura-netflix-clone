<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Selecione seu perfil para continuar assistindo">
    <title>Netflix - Quem está assistindo?</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/script.js" defer></script>
</head>
<body>
    <div class="logo">NETFLIX</div>

        <span class="icon-dark">🌙</span>
        <span class="icon-light">☀️</span>
    </button>
    <main>
        <header>
            <h1>Quem está assistindo?</h1>
        </header>
        
        <section class="profiles" aria-label="Perfis disponíveis">
            <ul class="profiles-list">
                <li class="profile">
                    <a href="/catalogo/catalogo.html" data-profile='{"name":"João","image":"/assets/perfil-1.png"}'>
                        <img src="/assets/perfil-1.png" alt="Perfil João" width="84" height="84">
                        <p>João</p>
                    </a>
                </li>

                <li class="profile">
                    <a href="/catalogo/catalogo.html" data-profile='{"name":"Maria","image":"/assets/perfil-2.png"}'>
                        <img src="/assets/perfil-2.png" alt="Perfil Maria" width="84" height="84">
                        <p>Maria</p>
                    </a>
                </li>

                <li class="profile">
                    <a href="/catalogo/catalogo.html" data-profile='{"name":"Jão","image":"/assets/perfil-2.png"}'>
                        <img src="/assets/perfil-2.png" alt="Perfil do Jão" width="84" height="84">
                        <p>Jão</p>
                    </a>
                </li>

                <li class="profile">
                    <a href="/catalogo/catalogo.html" data-profile='{"name":"Ma","image":"/assets/perfil-1.png"}'>
                        <img src="/assets/perfil-1.png" alt="Perfil da Ma" width="84" height="84">
                        <p>Ma</p>
                    </a>
                </li>
            </ul>
        </section> 
    </main>

    <script src="/index.js"></script>
</body>
</html>
